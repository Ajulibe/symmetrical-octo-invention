version: 2.1
orbs:
  aws-s3: circleci/aws-s3@1.0.11

workflows: # Define a Workflow running the build job, then the deploy job
  version: 2
  build-deploy: # Make a workflow to build and deploy your project
    jobs:
      - build
      - deploy:
          requires:
            - build # Only run deploy job once the build job has completed
          filters:
            branches:
              only: main

jobs: # Define the build and deploy jobs
  build:
    docker: # Use the Docker executor for the build job
      - image: circleci/node:12.9.1-browsers # Specify the Docker image to use for the build job

    working_directory: ~/repo

    steps:
      - checkout

      - restore_cache:
          keys:
            - v1-dependencies-{{ checksum "package.json" }}
            # fallback to using the latest cache if no exact match is found
            - v1-dependencies-
      - run: yarn install

      - save_cache:
          paths:
            - node_modules
            - ~/.npm
            - ~/.cache
          key: v1-dependencies-{{ checksum "package.json" }}

      - run: yarn test

      - run: yarn deploy

      - aws-s3/sync:
          from: out
          to: "s3://fashion-themed"
          arguments: | # Optional arguments
            --acl public-read \
            --cache-control "max-age=86400"
          overwrite: true # default is false
